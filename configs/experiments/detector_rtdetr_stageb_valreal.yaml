# RT-DETR (transformer detector) — same Ultralytics API as YOLO; good parallel experiment vs CNN YOLO.
experiment_name: det_rtdetr_l_stageb_valreal
seed: 42
task: detector
output_root: runs/paleo_experiments

data:
  val_manifest: data/real/manifest.jsonl
  real_source_id: real
  synth_stage_a_id: synth_stage_a
  synth_stage_b_id: synth_stage_b
  sources:
    - id: real
      path: data/real/manifest.jsonl
    - id: synth_stage_a
      path: data/stage_a/manifest.jsonl
    - id: synth_stage_b
      path: data/stage_b/manifest.jsonl

mixing:
  mode: single

detector:
  model: rtdetr-l.pt
  epochs: 2
  imgsz: 640
  batch: 4
  device: "0"
  workers: 4
  project: runs/detect
  run_name: rtdetr_l_stageb_valreal
  use_symlinks: true
  single_class: true
  regime: synth_train_real_val
