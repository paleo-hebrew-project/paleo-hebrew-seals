# Stage-A classifier ablation on the row_id group split.
# Mirrors sweep_classifier_stageb_base_group_split.yaml with phase 0 switched to synth_stage_a.
experiment_name: cls_sweep_stagea_base_group_split
seed: 42
task: classifier
output_root: runs/paleo_experiments

data:
  val_manifest: data/real/manifest_group_split.jsonl
  real_source_id: real
  synth_stage_a_id: synth_stage_a
  synth_stage_b_id: synth_stage_b
  sources:
    - id: real
      path: data/real/manifest_group_split.jsonl
    - id: synth_stage_a
      path: data/stage_a/manifest.jsonl
    - id: synth_stage_b
      path: data/stage_b/manifest.jsonl

mixing:
  mode: sequential

phases:
  - name: pretrain_stagea
    source_ids: [synth_stage_a]
    epochs: 20
    lr: 0.0003
  - name: finetune_real
    source_ids: [real]
    epochs: 120
    lr: 0.0001

classifier:
  model: convnext_base
  epochs: 140
  imgsz: 224
  batch: 256
  lr: 0.0003
  wd: 0.05
  amp: true
  best_metric: val_acc1
  topk: 3
  transform_style: notebook
  label_smoothing: 0.05
  warmup_epochs: 1.0
  cosine_schedule: true
  freeze_backbone_epochs: 1
  train_split_filter: train
  val_split_filter: validation
  num_workers: 8
  prefetch_factor: 8
  drop_last: true

notes: "Stage-A classifier ablation with row_id-group real split: structural synth pretrain, then real finetune."
