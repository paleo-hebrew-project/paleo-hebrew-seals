# Stage-A ablation for detector backbone sweeps.
# Same split, schedule, and augmentation recipe as sweep_detector_stageb_base.yaml,
# but phase 0 uses structural Stage A synthetic data instead of Stage B styled data.
experiment_name: det_sweep_stagea_seq_real_strongaug
seed: 42
task: detector
output_root: runs/paleo_experiments

data:
  # Use explicit val split (150 rows), not the full manifest.
  val_manifest: data/real/manifest_val.jsonl
  real_source_id: real
  synth_stage_a_id: synth_stage_a
  synth_stage_b_id: synth_stage_b
  sources:
    - id: real
      path: data/real/manifest_train.jsonl
    - id: synth_stage_a
      path: data/stage_a/manifest.jsonl
    - id: synth_stage_b
      path: data/stage_b/manifest.jsonl

mixing:
  mode: sequential

phases:
  - name: pretrain_stagea
    source_ids: [synth_stage_a]
    epochs: 10
    lr: 0.005
    train_overrides:
      patience: 0
      close_mosaic: 10
  - name: finetune_real
    source_ids: [real]
    epochs: 90
    lr: 0.005
    train_overrides:
      patience: 15
      close_mosaic: 50

detector:
  model: yolov8n.pt
  epochs: 100
  imgsz: 640
  batch: 128
  device: "0"
  workers: 16
  project: runs/detect
  run_name: sweep_stagea_seq_real_strongaug
  use_symlinks: true
  shared_dataset_cache: true
  shared_dataset_cache_root: runs/paleo_experiments/_shared_yolo_cache
  single_class: true
  regime: synth_train_real_val
  train_overrides:
    optimizer: AdamW
    cos_lr: true
    mosaic: 0.4
    mixup: 0.0
    close_mosaic: 10
    degrees: 3.0
    translate: 0.05
    scale: 0.4
    shear: 2.0
    perspective: 0.0005
    fliplr: 0.35
    flipud: 0.0
    auto_augment: randaugment
    erasing: 0.0

notes: "Stage-A detector ablation: 10 epochs structural synth pretrain, then 90 epochs real finetune on the same train/val split as Stage B."
