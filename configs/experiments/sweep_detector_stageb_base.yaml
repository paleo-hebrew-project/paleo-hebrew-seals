# Strong base config for detector backbone sweeps (override --detector-model from CLI).
# Two-stage regime aligned with notebook train8/train9: synth pretrain -> real finetune.
#
# Sequential mode (mixing.mode: sequential + phases):
#   - Each phase is a separate Ultralytics run; the next phase loads weights/ best.pt from the
#     previous run (best val fitness ~= mAP50-95 for detection).
#   - Phase length is ONLY phases[].epochs; detector.epochs below is a documented fallback for
#     non-sequential regimes (sum of phase epochs = 10 + 40).
#   - Per-phase train_overrides merge over detector.train_overrides (see schema / detector_train.py).

experiment_name: det_sweep_seq_real_strongaug
seed: 42
task: detector
output_root: runs/paleo_experiments

data:
  # Use explicit val split (150 rows), not the full manifest.
  val_manifest: notebooks/paleo_ocr_part2/yolo_22_from_val_split_singlecls/manifest_val.jsonl
  real_source_id: real
  synth_stage_a_id: synth_stage_a
  synth_stage_b_id: synth_stage_b
  sources:
    - id: real
      path: notebooks/paleo_ocr_part2/yolo_22_from_val_split_singlecls/manifest_train.jsonl
    - id: synth_stage_a
      path: runs/synthetic_v2_parallel_advanced_20260222/all_manifest.jsonl
    - id: synth_stage_b
      path: notebooks/syn_v2_styled_advanced_20260222/manifest.jsonl

mixing:
  mode: sequential

phases:
  - name: pretrain_synth
    source_ids: [synth_stage_b]
    epochs: 10
    lr: 0.005
    train_overrides:
      # Run the full short synth schedule; early stopping off (Ultralytics: patience 0).
      patience: 0
      close_mosaic: 10
  - name: finetune_real
    source_ids: [real]
    epochs: 90
    lr: 0.005
    train_overrides:
      # Finetune like train9: longer mosaic tail + early stopping on val.
      patience: 15
      close_mosaic: 50

detector:
  model: yolov8n.pt
  # Ignored when mixing.mode is sequential (see phases). Kept = sum(phase epochs) for clarity.
  epochs: 100
  imgsz: 640
  batch: 128
  device: "0"
  workers: 16
  project: runs/detect
  run_name: sweep_seq_real_strongaug
  use_symlinks: true
  shared_dataset_cache: true
  shared_dataset_cache_root: runs/paleo_experiments/_shared_yolo_cache
  single_class: true
  regime: synth_train_real_val
  train_overrides:
    optimizer: AdamW
    cos_lr: true
    mosaic: 0.4
    mixup: 0.0
    close_mosaic: 10
    degrees: 3.0
    translate: 0.05
    scale: 0.4
    shear: 2.0
    perspective: 0.0005
    fliplr: 0.35
    flipud: 0.0
    auto_augment: randaugment
    erasing: 0.0

notes: "Strong baseline for real OCR quality. Per-phase patience/close_mosaic; use noaug/lightaug variants for augmentation ablations."
