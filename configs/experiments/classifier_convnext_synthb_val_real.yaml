experiment_name: cls_convnext_stageb_valreal
seed: 42
task: classifier
output_root: runs/paleo_experiments

data:
  val_manifest: data/real/manifest.jsonl
  real_source_id: real
  synth_stage_a_id: synth_stage_a
  synth_stage_b_id: synth_stage_b
  sources:
    - id: real
      path: data/real/manifest.jsonl
    - id: synth_stage_a
      path: data/stage_a/manifest.jsonl
    - id: synth_stage_b
      path: data/stage_b/manifest.jsonl

mixing:
  mode: single

classifier:
  model: convnext_base
  epochs: 20
  imgsz: 128
  batch: 256
  lr: 0.0003
  wd: 0.0001
  amp: false
  best_metric: macro_f1
  topk: 5
