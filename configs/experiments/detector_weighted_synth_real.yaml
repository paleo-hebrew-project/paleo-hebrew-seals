experiment_name: det_yolo_weighted_real_synthb
seed: 42
task: detector
output_root: runs/paleo_experiments

data:
  val_manifest: data/real/manifest.jsonl
  real_source_id: real
  synth_stage_a_id: synth_stage_a
  synth_stage_b_id: synth_stage_b
  sources:
    - id: real
      path: data/real/manifest.jsonl
    - id: synth_stage_a
      path: data/stage_a/manifest.jsonl
    - id: synth_stage_b
      path: data/stage_b/manifest.jsonl

mixing:
  mode: weighted
  weights:
    synth_stage_b: 1.0
    real: 0.3

detector:
  model: yolov8n.pt
  epochs: 2
  imgsz: 640
  batch: 8
  device: "0"
  workers: 4
  project: runs/detect
  run_name: yolo_weighted
  regime: synth_train_real_val
